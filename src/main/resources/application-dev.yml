logging:
  level:
    root: INFO
    me.geohod: DEBUG
    org.springframework.security: WARN
    org.springframework.web.cors: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

spring:
  mail:
    host: localhost
    port: 1025
  datasource:
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

geohod:
   cors:
     allowed-origins:
       - "http://localhost:3000"
       - "http://127.0.0.1:3000"

   security:
     jwt:
       secret: dev-secret-key-at-least-32-characters-long-for-hmac
       access-token-expiration: 60m
       refresh-token-expiration: 30d
     legacy-telegram-auth:
       enabled: true
     email-otp:
       code-length: 6
       expiration: 10m
       max-attempts: 10
       max-sends-per-hour: 20

   processor:
     in-app:
       delay: 10000
     telegram:
       delay: 10000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true