server:
  port: 8080
spring:
  application:
    name: geohod-backend
  main:
    banner-mode: "off"
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  mail:
    host: localhost
    port: 587
    username:
    password:
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mail:
      enabled: false

geohod:
  telegram-bot:
    token:
    username:
  linkTemplates:
    startappLink: https://t.me/${GEOHOD_TELEGRAM_BOT_USERNAME}?startapp=

  cors:
    allowed-origins:
    allowed-methods:
      - "GET"
      - "POST"
      - "PATCH"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

  security:
    telegram-oidc:
      client-id:
      client-secret:
      issuer-uri: https://oauth.telegram.org
      jwks-uri: https://oauth.telegram.org/.well-known/jwks.json
      token-uri: https://oauth.telegram.org/token
      jwks-cache-ttl: 1h
    telegram-init-data:
      max-age: 5m
    jwt:
      secret:
      access-token-expiration: 15m
      refresh-token-expiration: 30d
    legacy-telegram-auth:
      enabled: true
    cookie:
      same-site: Lax
      secure: true
    email-otp:
      code-length: 6
      expiration: 5m
      max-attempts: 5
      max-sends-per-hour: 3

  processor:
    in-app:
      delay: 5000
    telegram:
      delay: 5000
