name: Cleanup GHCR

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    name: Prune old GHCR images
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
      - name: Prune old geohod-backend versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: geohod-backend
          package-type: container
          min-versions-to-keep: 10
          delete-untagged-versions: true
          token: ${{ secrets.GITHUB_TOKEN }}
