name: Release

# Production release follows "build once, promote by digest":
#   - on tag push: retag the existing sha-<commit> image (already validated in dev) as v* + latest
#   - on manual dispatch: retag an existing v* image as latest (used for rollback)
# Source is never rebuilt for prod — identical bytes ship from dev → prod.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing image tag to deploy (e.g. v1.2.3). Use for rollback.'
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  promote:
    name: Promote image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ steps.compute.outputs.tag }}

    steps:
      - name: Resolve source and target tags
        id: compute
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            SRC="$TAG"
          else
            TAG="${{ github.ref_name }}"
            SHA7=$(echo '${{ github.sha }}' | cut -c1-7)
            SRC="sha-${SHA7}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "src=$SRC" >> "$GITHUB_OUTPUT"
          echo "Source: ghcr.io/${OWNER}/geohod-backend:${SRC}"
          echo "Target: ghcr.io/${OWNER}/geohod-backend:${TAG} + latest"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify source image exists in GHCR
        run: |
          REPO="ghcr.io/${{ steps.compute.outputs.owner }}/geohod-backend"
          SRC="${{ steps.compute.outputs.src }}"
          if ! docker buildx imagetools inspect "${REPO}:${SRC}" >/dev/null 2>&1; then
            echo "::error::Source image ${REPO}:${SRC} not found in GHCR."
            echo "::error::For tag pushes: the sha-<commit> image must already exist (built by the dev workflow on main)."
            echo "::error::For dispatch rollback: the tag input must reference an existing image."
            exit 1
          fi
          echo "Source image present."

      - name: Retag source → target + latest
        run: |
          REPO="ghcr.io/${{ steps.compute.outputs.owner }}/geohod-backend"
          docker buildx imagetools create \
            --tag "${REPO}:${{ steps.compute.outputs.tag }}" \
            --tag "${REPO}:latest" \
            "${REPO}:${{ steps.compute.outputs.src }}"
          echo "Retagged successfully."

  deploy:
    name: Deploy
    needs: promote
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      environment: production
      image_tag: latest
      deploy_dir: deployments/prod
      host_dir: geohod-backend
      app_container: geohod-backend
      pg_container: geohod-postgres
