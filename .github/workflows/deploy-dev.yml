name: Deploy dev

on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Build application with Gradle container
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            gradle:9.2.1-jdk25 \
            gradle build -x test

      - name: Build container image with Docker
        uses: docker/build-push-action@v6.0.0
        with:
          context: .
          file: ./.github/Dockerfile
          tags: geohod-backend:dev-latest
          labels: stage=dev
          outputs: type=docker,dest=/tmp/geohod-backend-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Move image to workspace
        run: mv /tmp/geohod-backend-image.tar ./geohod-backend-image.tar

      - name: Create .env file
        run: |
          cat << EOF > .env
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          LOGGING_LEVEL_ROOT=WARN
          LOGGING_LEVEL_ME_GEOHOD=DEBUG
          SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${{ secrets.POSTGRES_DB }}
          SPRING_DATASOURCE_USERNAME=${{ secrets.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          GEOHOD_TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEOHOD_TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
          GEOHOD_CREATED_EVENT_LINK_TEMPLATE=${{ vars.GEOHOD_CREATED_EVENT_LINK_TEMPLATE }}
          GEOHOD_REVIEW_LINK_TEMPLATE=${{ vars.GEOHOD_REVIEW_LINK_TEMPLATE }}
          GEOHOD_CORS_ALLOWED_ORIGINS=${{ vars.CORS_ALLOWED_ORIGINS }}
          EOF

      - name: Compress image for transfer
        run: gzip -k geohod-backend-image.tar

      - name: Transfer env & artifacts to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".env,geohod-backend-image.tar.gz"
          target: "~/geohod-backend-dev"

      - name: Transfer configuration to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deployments/dev/podman-compose.yml,deployments/dev/install.sh,deployments/dev/geohod-backend-dev.service"
          target: "~/geohod-backend-dev"
          strip_components: 2

      - name: Execute remote deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            chmod +x ~/geohod-backend-dev/install.sh
            ~/geohod-backend-dev/install.sh
