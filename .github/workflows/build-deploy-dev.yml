name: Build and Deploy Dev

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build and Push Dev Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      sha: ${{ steps.vars.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image vars
        id: vars
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/geohod-backend:dev-latest
            ghcr.io/${{ steps.vars.outputs.owner }}/geohod-backend:sha-${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build]
    environment: development
    permissions: {}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Quadlet files to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deployments/dev/*.container,deployments/dev/*.network,deployments/dev/*.volume"
          target: "/tmp/geohod-deploy-dev/"
          strip_components: 2

      - name: Write postgres.env on VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ vars.DB_NAME }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_USER,DB_PASSWORD,DB_NAME
          script: |
            set -euo pipefail
            mkdir -p "$HOME/geohod-backend-dev"
            {
              printf 'POSTGRES_USER=%s\n'     "$DB_USER"
              printf 'POSTGRES_PASSWORD=%s\n' "$DB_PASSWORD"
              printf 'POSTGRES_DB=%s\n'       "$DB_NAME"
            } > "$HOME/geohod-backend-dev/postgres.env"
            chmod 600 "$HOME/geohod-backend-dev/postgres.env"
            echo "--> postgres.env written"

      - name: Write app.env on VPS
        uses: appleboy/ssh-action@v1.2.5
        env:
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ vars.DB_NAME }}
          SPRING_MAIL_HOST: ${{ vars.SPRING_MAIL_HOST }}
          SPRING_MAIL_PORT: ${{ vars.SPRING_MAIL_PORT }}
          SPRING_MAIL_USERNAME: ${{ vars.SPRING_MAIL_USERNAME }}
          SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
          GEOHOD_TELEGRAM_BOT_TOKEN: ${{ secrets.GEOHOD_TELEGRAM_BOT_TOKEN }}
          GEOHOD_TELEGRAM_BOT_USERNAME: ${{ vars.GEOHOD_TELEGRAM_BOT_USERNAME }}
          GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_ID: ${{ secrets.GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_ID }}
          GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_SECRET: ${{ secrets.GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_SECRET }}
          GEOHOD_SECURITY_JWT_SECRET: ${{ secrets.GEOHOD_SECURITY_JWT_SECRET }}
          GEOHOD_CORS_ALLOWED_ORIGINS: ${{ vars.GEOHOD_CORS_ALLOWED_ORIGINS }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_USER,DB_PASSWORD,DB_NAME,SPRING_MAIL_HOST,SPRING_MAIL_PORT,SPRING_MAIL_USERNAME,SPRING_MAIL_PASSWORD,GEOHOD_TELEGRAM_BOT_TOKEN,GEOHOD_TELEGRAM_BOT_USERNAME,GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_ID,GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_SECRET,GEOHOD_SECURITY_JWT_SECRET,GEOHOD_CORS_ALLOWED_ORIGINS
          script: |
            set -euo pipefail
            mkdir -p "$HOME/geohod-backend-dev"
            {
              printf 'SPRING_DATASOURCE_URL=%s\n'                        "jdbc:postgresql://geohod-postgres-dev:5432/$DB_NAME"
              printf 'SPRING_DATASOURCE_USERNAME=%s\n'                   "$DB_USER"
              printf 'SPRING_DATASOURCE_PASSWORD=%s\n'                   "$DB_PASSWORD"
              printf 'SPRING_MAIL_HOST=%s\n'                             "$SPRING_MAIL_HOST"
              printf 'SPRING_MAIL_PORT=%s\n'                             "$SPRING_MAIL_PORT"
              printf 'SPRING_MAIL_USERNAME=%s\n'                         "$SPRING_MAIL_USERNAME"
              printf 'SPRING_MAIL_PASSWORD=%s\n'                         "$SPRING_MAIL_PASSWORD"
              printf 'GEOHOD_TELEGRAM_BOT_TOKEN=%s\n'                    "$GEOHOD_TELEGRAM_BOT_TOKEN"
              printf 'GEOHOD_TELEGRAM_BOT_USERNAME=%s\n'                 "$GEOHOD_TELEGRAM_BOT_USERNAME"
              printf 'GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_ID=%s\n'      "$GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_ID"
              printf 'GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_SECRET=%s\n'  "$GEOHOD_SECURITY_TELEGRAM_OIDC_CLIENT_SECRET"
              printf 'GEOHOD_SECURITY_JWT_SECRET=%s\n'                   "$GEOHOD_SECURITY_JWT_SECRET"
              printf 'GEOHOD_CORS_ALLOWED_ORIGINS=%s\n'                  "$GEOHOD_CORS_ALLOWED_ORIGINS"
            } > "$HOME/geohod-backend-dev/app.env"
            chmod 600 "$HOME/geohod-backend-dev/app.env"
            echo "--> app.env written"

      - name: Deploy to dev VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${OWNER}/geohod-backend:dev-latest"
            QUADLET_DIR="$HOME/.config/containers/systemd"

            echo "--> Installing Quadlet files..."
            mkdir -p "$QUADLET_DIR"
            cp /tmp/geohod-deploy-dev/*.container "$QUADLET_DIR/"
            cp /tmp/geohod-deploy-dev/*.network "$QUADLET_DIR/"
            cp /tmp/geohod-deploy-dev/*.volume "$QUADLET_DIR/"
            rm -rf /tmp/geohod-deploy-dev/

            echo "--> Pulling new image..."
            podman pull "$IMAGE"

            echo "--> Reloading systemd and restarting backend..."
            systemctl --user daemon-reload
            systemctl --user start geohod-postgres-dev
            systemctl --user restart geohod-backend-dev

            echo "--> Waiting for container to become healthy..."
            for i in $(seq 1 24); do
              sleep 5
              echo "Health check $i/24..."
              STATUS=$(podman inspect geohod-backend-dev --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
              echo "Container status: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Deployment successful"
                exit 0
              fi
            done
            echo "Health check timed out — deployment FAILED"
            exit 1
