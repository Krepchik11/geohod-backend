name: Build and Deploy Dev

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build:
    name: Build and Push Dev Image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    outputs:
      sha: ${{ steps.meta.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract short SHA
        id: meta
        run: echo "sha=$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/geohod-backend:dev-latest
            ghcr.io/${{ github.repository_owner }}/geohod-backend:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build]
    environment: development
    permissions: {}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy Quadlet files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deployments/dev/*.container,deployments/dev/*.network,deployments/dev/*.volume"
          target: "/tmp/geohod-deploy-dev/"
          strip_components: 2

      - name: Deploy to dev VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            OWNER="${{ github.repository_owner }}"
            IMAGE="ghcr.io/${OWNER}/geohod-backend:dev-latest"
            QUADLET_DIR="$HOME/.config/containers/systemd"

            echo "--> Installing Quadlet files..."
            mkdir -p "$QUADLET_DIR"
            cp /tmp/geohod-deploy-dev/*.container "$QUADLET_DIR/"
            cp /tmp/geohod-deploy-dev/*.network "$QUADLET_DIR/"
            cp /tmp/geohod-deploy-dev/*.volume "$QUADLET_DIR/"
            rm -rf /tmp/geohod-deploy-dev/

            echo "--> Pulling new image..."
            podman pull "$IMAGE"

            echo "--> Reloading systemd and restarting backend..."
            systemctl --user daemon-reload
            systemctl --user enable --now geohod-postgres-dev
            systemctl --user restart geohod-backend-dev

            echo "--> Waiting for container to become healthy..."
            for i in $(seq 1 24); do
              sleep 5
              echo "Health check $i/24..."
              STATUS=$(podman inspect geohod-backend-dev --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
              echo "Container status: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Deployment successful"
                exit 0
              fi
            done
            echo "Health check timed out — deployment FAILED"
            exit 1
