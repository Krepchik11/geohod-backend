name: Build and Deploy Dev

on:
  push:
    branches: [main]

concurrency:
  group: build-dev
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run tests
        run: ./gradlew test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 7

  build:
    name: Build and Push Dev Image
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      sha7: ${{ steps.vars.outputs.sha7 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image vars
        id: vars
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "sha7=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/geohod-backend:sha-${{ steps.vars.outputs.sha7 }}
            ghcr.io/${{ steps.vars.outputs.owner }}/geohod-backend:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build
    uses: ./.github/workflows/_deploy.yml
    secrets: inherit
    with:
      environment: development
      image_tag: dev-latest
      deploy_dir: deployments/dev
      host_dir: geohod-backend-dev
      app_container: geohod-backend-dev
      pg_container: geohod-postgres-dev
